<div class="register-container">

  <div class="card">

    <h2 class="title">Create Account 🚀</h2>
    <p class="subtitle">Register to continue</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="userForm" class="user-form">

      <!-- Username -->
      <div class="form-group">
        <input type="text" formControlName="username" required />
        <label>Username</label>
      </div>

      <!-- Password -->
      <div class="form-group">
        <input type="password" formControlName="password" required />
        <label>Password</label>
      </div>

      <!-- Full Name -->
      <div class="form-group">
        <input type="text" formControlName="name" required />
        <label>Full Name</label>
      </div>

      <!-- Email -->
      <div class="form-group">
        <input type="email" formControlName="email" required />
        <label>Email</label>
      </div>

      <!-- Role -->
      <div class="form-group">
        <select formControlName="role" required>
          <option value="" disabled selected>Select Role</option>
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>

      <!-- Button -->
      <button type="submit" [disabled]="userForm.invalid">
        Create User
      </button>

      <!-- Messages -->
      <div *ngIf="userError$ | async as error" class="error">
        {{ error }}
      </div>

      <div *ngIf="userSuccess$ | async as msg" class="success">
        {{ msg }}
      </div>

      <!-- Link -->
      <a routerLink="/auth" class="task-link">
        Already have an account? Login
      </a>

    </form>

  </div>
</div>
